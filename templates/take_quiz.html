{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">{{ quiz.title }}</h2>

<form method="POST">

{% for question in quiz.questions %}
    <div class="card mb-3">
        <div class="card-body">
            <p><strong>{{ question.question_text }}</strong></p>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="{{ question.id }}" value="A">
                <label class="form-check-label">A. {{ question.option_a }}</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="{{ question.id }}" value="B">
                <label class="form-check-label">B. {{ question.option_b }}</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="{{ question.id }}" value="C">
                <label class="form-check-label">C. {{ question.option_c }}</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="{{ question.id }}" value="D">
                <label class="form-check-label">D. {{ question.option_d }}</label>
            </div>
        </div>
    </div>
{% endfor %}

<button type="submit" class="btn btn-success">Submit Quiz</button>

</form>

{% endblock %}
